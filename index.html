<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>2048</title>
	<meta name="description" content="2048 game">
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/gameHeader.css">
    <link rel="stylesheet" href="./styles/style.css">
	<link rel="icon" href="./assets/favicon.ico">
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>2048</h1>
			<!-- <p>HTML5 boilerplate.</p> -->
		</header>

		<main>
			<!-- Game root -->
             <!-- Game will be mounted here. -->
			<div id="game">
                <div id="gameHeader">
					<div id="scoreBox" class="field-box">
						<span class="score field-name">
							Score
						</span>
						<span id="score-value" class="score field-value" data-reactive="score">
							0
						</span>
					</div>
					<div id="bestBox" class="field-box" data-reactive="best">
						<span class="best field-name">
							Best
						</span>
						<span id="best-value" class="best field-value">
							0
						</span>
					</div>
					<button id="resetBtn" onclick="action('reset');">New Game</button>
				</div>
                <div id="gameBoard"></div>
            </div>
		</main>

		<footer>
			<span class="footer-name">David Jarvis</span> <small>&copy;<span id="year"></span></small>
		</footer>
	</div>

	<script>
		// Small script to set year
		document.getElementById('year').textContent = new Date().getFullYear();
	</script>
    <script src="./scripts/reactivity.js"></script>
    <script src="./scripts/globals.js"></script>
    <script src="./scripts/reactiveBindings.js"></script>
    <script src="./scripts/initialize.js"></script>
    <script src="./scripts/controls.js"></script>
    <script src="./scripts/ui.js"></script>
</body>
</html>
