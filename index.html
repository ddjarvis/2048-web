<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>2048</title>
	
	<link rel="shortcut icon" href="assets/icons/favicon.ico">
	
	<link rel="apple-touch-icon" href="assets/icons/apple/apple-touch-icon.png">
	<link rel="apple-touch-startup-image" href="assets/icons/apple/apple-touch-startup-image-640x1096.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"> <!-- iPhone 5+ -->
	<link rel="apple-touch-startup-image" href="assets/icons/apple/apple-touch-startup-image-640x920.png"  media="(device-width: 320px) and (device-height: 480px) and (-webkit-device-pixel-ratio: 2)"> <!-- iPhone, retina -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">

	<meta name="HandheldFriendly" content="True">
	<meta name="MobileOptimized" content="320">
	<meta name="viewport" content="width=device-width, target-densitydpi=160dpi, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
		
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="theme-color" content="#000000">
	<link rel="manifest" href="/manifest.json">

	<meta name="description" content="2048 game">

    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/gameHeader.css">
	<link rel="icon" href="./assets/favicon.ico">

    <script defer src="./scripts/helpers.js"></script>
    <script defer src="./scripts/events.js"></script>
    <script defer src="./scripts/reactivity.js"></script>
    <script defer src="./scripts/globals.js"></script>
    <script defer src="./scripts/reactiveBindings.js"></script>
    <script defer src="./scripts/dataStorage.js"></script>
    <script defer src="./scripts/controls.js"></script>
    <script defer src="./scripts/initialize.js"></script>
    <script defer src="./scripts/ui.js"></script>
    <script defer src="./scripts/actions.js"></script>
    <script defer src="./temp.js"></script>
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>2048</h1>
			<!-- <p>HTML5 boilerplate.</p> -->
		</header>

		<main>
			<!-- Game root -->
             <!-- Game will be mounted here. -->
			<div id="game">
                <div id="gameHeader">
					<div id="scoreBox" class="field-box">
						<span class="score field-name">
							Score
						</span>
						<span id="score-value" class="score field-value" data-reactive="score">
							0
						</span>
					</div>
					<div id="bestBox" class="field-box">
						<span class="best field-name">
							Best
						</span>
						<span id="best-value" class="best field-value" data-reactive="best">
							0
						</span>
					</div>
					<button id="resetBtn" onclick="newGame();">New Game</button>
				</div>
                <div id="gameBoard"></div>
				<div id="stateArea"><span class="gameStatus"></span></div>
            </div>
		</main>

		<footer>
			<span class="footer-name">
				<span class="footer-author">
					David Jarvis
				</span>
				<small>&copy;<span id="year"></span></small>
			</span>
		</footer>
	</div>

	<script>
		// Small script to set year
		document.getElementById('year').textContent = new Date().getFullYear();
	</script>
</html>
